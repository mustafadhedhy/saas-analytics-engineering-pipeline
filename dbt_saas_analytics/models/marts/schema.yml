version: 2

models:
  - name: dim_accounts
    description: Account dimension table enriched with user counts.
    columns:
      - name: account_id
        tests:
          - unique
          - not_null

  - name: fct_events
    description: Product usage event fact table.
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: account_id
        tests:
          - not_null
      - name: event_type
        tests:
          - not_null

  - name: fct_subscriptions
    description: Subscription fact table with active MRR calculation.
    columns:
      - name: subscription_id
        tests:
          - unique
          - not_null
      - name: account_id
        tests:
          - not_null

  - name: fct_support_tickets
    description: Support ticket fact table with resolution time calculation.
    columns:
      - name: ticket_id
        tests:
          - unique
          - not_null
      - name: account_id
        tests:
          - not_null

  - name: mart_account_health
    description: Account-level customer health mart combining usage, revenue, and support data.
    columns:
      - name: account_id
        tests:
          - unique
          - not_null
      - name: account_health_status
        tests:
          - not_null

  - name: mart_monthly_product_usage
    description: Monthly product usage summary for Power BI dashboarding.
    columns:
      - name: event_month
        tests:
          - unique
          - not_null
      - name: total_events
        tests:
          - not_null

  - name: mart_plan_revenue_summary
    description: Plan-level revenue, usage, support, and account health summary.
    columns:
      - name: plan_type
        tests:
          - unique
          - not_null
      - name: total_active_mrr
        tests:
          - not_null