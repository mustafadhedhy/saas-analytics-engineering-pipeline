version: 2

models:
  - name: stg_accounts
    description: Cleaned account-level SaaS customer data.
    columns:
      - name: account_id
        tests:
          - unique
          - not_null
      - name: account_name
        tests:
          - not_null
      - name: plan_type
        tests:
          - not_null

  - name: stg_users
    description: Cleaned user-level data linked to customer accounts.
    columns:
      - name: user_id
        tests:
          - unique
          - not_null
      - name: account_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_accounts')
              field: account_id

  - name: stg_subscriptions
    description: Cleaned subscription and recurring revenue data.
    columns:
      - name: subscription_id
        tests:
          - unique
          - not_null
      - name: account_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_accounts')
              field: account_id
      - name: monthly_revenue
        tests:
          - not_null

  - name: stg_events
    description: Cleaned product usage event data.
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_users')
              field: user_id
      - name: account_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_accounts')
              field: account_id
      - name: event_type
        tests:
          - not_null

  - name: stg_support_tickets
    description: Cleaned customer support ticket data.
    columns:
      - name: ticket_id
        tests:
          - unique
          - not_null
      - name: account_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_accounts')
              field: account_id
      - name: ticket_status
        tests:
          - not_null